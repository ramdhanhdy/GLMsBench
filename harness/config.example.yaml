model: glm-5.2
generation:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 960
  seed: 42
repeats:
  parity: 1
  latency: 5
suites: [mmlu, gsm8k, arc, humaneval]
suite_sizes:
  mmlu: 200
  gsm8k: 200
  arc: 200
  humaneval: 164
# Usage-tier bands (tokens/day) used to turn each provider's flat
# subscription fee into a comparable effective $/1M-token range. Based on
# observed personal usage: light/early-setup days vs. hours maximized.
usage_tiers:
  early_setup: {tokens_per_day_min: 50000000, tokens_per_day_max: 90000000}
  maximized: {tokens_per_day_min: 100000000, tokens_per_day_max: 300000000}

providers:
  zai:
    # Coding-plan OpenAI-compatible endpoint (NOT the general /v1 pay-as-you-go
    # path — that 404s and wouldn't route through the subscription quota anyway).
    # https://docs.z.ai/devpack/quick-start
    base_url: https://api.z.ai/api/coding/paas/v4
    api_key_env: ZAI_API_KEY
    model_id: glm-5.2
    # Real access here is via the Z.ai coding subscription (flat fee +
    # quota), not metered pay-as-you-go. Using the Lite plan actually paid
    # for; switch to Pro or to mode: metered (pay-per-token API, also
    # offered by Z.ai and other GLM-5.2 inference providers) as needed.
    #   - Lite: $16/mo, ~70M tokens/week observed before hitting the weekly
    #     cap. Has both a 5-hour rolling limit and a weekly limit.
    #   - Pro: $64/mo, ~5x Lite's usage allowance.
    # RELIABILITY: Z.ai is the less-available side of the asymmetry — GLM-5.2
    # is in high demand on their infra, so throttling/capacity issues are
    # more frequent here than on umans. Conservative concurrency/rpm below
    # reflect that; expect this provider to show up worse in the Rate
    # Limits / effective-latency sections (that's the signal, not a bug).
    pricing: {mode: subscription, monthly_usd: 16}
    rate: {concurrency: 2, rpm: 60, tpm: 500000}
  umans:
    base_url: https://api.code.umans.ai/v1
    api_key_env: UMANS_API_KEY
    model_id: umans-glm-5.2
    # umans is subscription-only (no metered option known). Per
    # https://app.umans.ai/offers/code/docs (Limits section), official plans:
    #   - Code Max ($50/mo): unlimited tokens, no rolling request window, but
    #     hard-capped at 4 in-flight requests — use this for real runs.
    #   - Code Pro ($20/mo): 200 effective requests per rolling 5-hour window
    #     (not a fixed reset), up to 5 in-flight — too restrictive for a full
    #     benchmark run (thousands of requests) but fine for light use.
    # Direct API-key HTTP access (what this harness does) is an officially
    # supported "Manual Configuration" path, not just the umans CLI.
    # RELIABILITY: umans has a hard provider-side concurrent-request cap and
    # repeated over-limit traffic can suspend the account. Large/high-token
    # runs must leave the provider exclusive to the benchmark and run
    # sequentially with fail-fast enabled. Do not raise this back to the plan's
    # advertised cap unless the provider confirms dashboard concurrency cannot
    # burst above the local semaphore.
    pricing: {mode: subscription, monthly_usd: 50}
    rate:
      concurrency: 1
      retry: {max_attempts: 1, base_backoff_ms: 1000}
      fail_fast_statuses: [429, 403]
      request_delay_s: 2.0
